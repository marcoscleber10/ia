<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub de APIs e IA</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      padding: 25px;
      text-align: center;
      background: #111827;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    header p {
      color: #94a3b8;
    }

    .search {
      display: flex;
      justify-content: center;
      margin: 20px;
    }

    input {
      width: 90%;
      max-width: 500px;
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      padding: 10px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 15px;
      width: 300px;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .rank {
      font-size: 12px;
      color: #38bdf8;
      margin-bottom: 5px;
    }

    .score {
      font-size: 12px;
      color: #a7f3d0;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 13px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #64748b;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header>
  <h1>🤖 Hub de APIs e Inteligência Artificial</h1>
  <p>Ranking gratuito de ferramentas e APIs de IA atualizado automaticamente</p>
</header>

<!-- SEARCH -->
<div class="search">
  <input id="searchInput" placeholder="🔎 Buscar API ou ferramenta..." onkeyup="render()">
</div>

<!-- LIST -->
<div class="container" id="list"></div>

<footer>
  Sistema gratuito de curadoria de APIs • Atualização automática simulada
</footer>

<script>
/* ---------------------------
   BASE DE DADOS (EDITÁVEL)
----------------------------*/
let apis = [
  {
    name: "Artificial Analysis",
    desc: "Comparador de modelos de IA (GPT, Claude, Gemini). Mostra custo, velocidade e performance.",
    url: "https://artificialanalysis.ai/",
    score: 95
  },
  {
    name: "APIs Gratuitas (BitNada)",
    desc: "Lista de APIs com free tier como Gemini, Hugging Face, OpenRouter e outras.",
    url: "https://bitnada.com.br/ia/apis-gratuitas.html",
    score: 85
  },
  {
    name: "Groq API",
    desc: "API extremamente rápida para LLMs open-source como Llama e Mixtral.",
    url: "https://groq.com/",
    score: 90
  },
  {
    name: "Hugging Face API",
    desc: "Plataforma com centenas de modelos open-source para IA e NLP.",
    url: "https://huggingface.co/",
    score: 88
  }
];

/* ---------------------------
   RENDERIZAÇÃO + RANKING
----------------------------*/
function render() {
  const list = document.getElementById("list");
  const search = document.getElementById("searchInput").value.toLowerCase();

  let filtered = apis.filter(a =>
    a.name.toLowerCase().includes(search) ||
    a.desc.toLowerCase().includes(search)
  );

  // ranking automático
  filtered.sort((a, b) => b.score - a.score);

  list.innerHTML = "";

  filtered.forEach((api, index) => {
    list.innerHTML += `
      <div class="card">
        <div class="rank">#${index + 1} no ranking</div>
        <h3>${api.name}</h3>
        <p>${api.desc}</p>
        <div class="score">Score: ${api.score}</div>
        <a class="btn" href="${api.url}" target="_blank">Acessar</a>
      </div>
    `;
  });
}

/* ---------------------------
   AUTO UPDATE SIMULADO
   (aqui você pode trocar por API real depois)
----------------------------*/
function autoUpdate() {
  apis = apis.map(api => {
    // simula variação leve de score
    let variation = Math.floor(Math.random() * 3) - 1;
    return {
      ...api,
      score: Math.min(100, Math.max(60, api.score + variation))
    };
  });

  render();
}

// inicial
render();

// atualiza ranking a cada 10 segundos (simulação gratuita)
setInterval(autoUpdate, 10000);

</script>

</body>
</html>
